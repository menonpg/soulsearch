<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulSearch Agent</title>
  <link rel="stylesheet" href="../popup/popup.css">
  <style>
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      overflow: hidden !important;
      background: #1e1b2e !important;
    }
    .ss-container {
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      display: flex !important;
      flex-direction: column !important;
      padding: 0 !important;
      margin: 0 !important;
      box-sizing: border-box !important;
    }
    .ss-header {
      flex-shrink: 0 !important;
      padding: 12px 16px !important;
    }
    .ss-context {
      flex-shrink: 0 !important;
      padding: 8px 16px !important;
    }
    .ss-chat {
      flex: 1 1 auto !important;
      overflow-y: auto !important;
      min-height: 0 !important;
      padding: 8px 16px !important;
    }
    .ss-input-area {
      flex-shrink: 0 !important;
      padding: 12px 16px !important;
      margin-top: auto !important;
      background: #1e1b2e !important;
      border-top: 1px solid #3d3b54 !important;
    }
  </style>
</head>
<body>
  <div class="ss-container">
    <div class="ss-header">
      <span class="ss-logo">🔍 SoulSearch Agent</span>
      <span class="ss-status">
        <span class="ss-dot" id="ss-dot"></span>
        <span id="ss-status-text">connecting...</span>
      </span>
    </div>
    
    <div class="ss-context">
      <span class="ss-context-label">Page:</span>
      <span class="ss-context-title" id="ss-page-title">—</span>
    </div>

    <div class="ss-chat" id="ss-chat">
      <div class="ss-message ss-message--system">
        Agent Mode — I will browse and interact with pages for you. Describe your task below.
      </div>
    </div>

    <div class="ss-input-area">
      <textarea id="ss-input" class="ss-input" placeholder="Describe a task to perform on this page..." rows="2"></textarea>
      <button id="ss-send-btn" class="ss-btn ss-btn--primary">Run Agent</button>
    </div>
  </div>
  <script src="sidepanel.js" type="module"></script>
</body>
</html>
