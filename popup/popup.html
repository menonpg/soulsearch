<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulSearch</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="ss-container">
    <!-- Header -->
    <div class="ss-header">
      <div class="ss-logo">
        <span class="ss-soul">Soul</span><span class="ss-search">Search</span>
      </div>
      <div class="ss-status" id="ss-status">
        <span class="ss-dot" id="ss-dot"></span>
        <span id="ss-status-text">Connecting...</span>
      </div>
    </div>

    <!-- Page Context Strip -->
    <div class="ss-context-strip" id="ss-context-strip">
      <span class="ss-context-label">Reading:</span>
      <span class="ss-context-title" id="ss-page-title">—</span>
    </div>

    <!-- Chat Area -->
    <div class="ss-chat" id="ss-chat">
      <div class="ss-message ss-message--system">
        Ask me anything about this page, or start a research thread. I remember everything.
      </div>
    </div>

    <!-- Memory Panel (overlay) -->
    <div class="ss-memory-panel" id="ss-memory-peek" style="display:none">
      <div class="ss-memory-panel-header">
        <span>&#129504; Memory</span>
        <div class="ss-memory-panel-actions">
          <button class="ss-btn ss-btn--icon ss-btn--small" id="ss-mem-push" title="Push to Git">&#128640;</button>
          <button class="ss-btn ss-btn--icon ss-btn--small" id="ss-mem-close" title="Close">&#215;</button>
        </div>
      </div>
      <div class="ss-memory-panel-body" id="ss-memory-text"></div>
    </div>

    <!-- Input -->
    <div class="ss-input-area">
      <textarea
        id="ss-input"
        class="ss-input"
        placeholder="Ask about this page, research a topic, or continue where you left off..."
        rows="2"
      ></textarea>
      <div class="ss-input-actions">
        <button class="ss-btn ss-btn--icon" id="ss-ctx-btn" title="Include page context">📄</button>
        <button class="ss-btn ss-btn--icon" id="ss-mem-btn" title="Show memory">🧠</button>
        <button class="ss-btn ss-btn--icon" id="ss-agent-btn" title="Agent mode">&#129302;</button>
        <button class="ss-btn ss-btn--primary" id="ss-send-btn">Ask &#8594;</button>
      </div>
    </div>

    <!-- Settings -->
    <div class="ss-footer">
      <a href="#" id="ss-settings-link" class="ss-link">⚙ Settings</a>
      <span class="ss-divider">·</span>
      <a href="https://github.com/menonpg/soulsearch" target="_blank" class="ss-link">GitHub</a>
      <span class="ss-divider">·</span>
      <a href="https://pypi.org/project/soul-agent/" target="_blank" class="ss-link">soul.py</a>
    </div>
  </div>

  <div id="ss-settings" class="ss-settings" style="display:none">
    <div class="ss-settings-inner">
      <h3>Settings</h3>

      <div class="ss-settings-section">
        <div class="ss-settings-section-title">🤖 LLM</div>
        <label>Provider
          <select id="cfg-provider">
            <option value="anthropic">Anthropic (Claude)</option>
            <option value="openai">OpenAI (GPT-4o)</option>
            <option value="gemini">Google Gemini</option>
          </select>
        </label>
        <label>API Key
          <input type="password" id="cfg-llm-key" placeholder="sk-ant-... or sk-..." />
        </label>
        <label>Model
          <input type="text" id="cfg-model" placeholder="e.g. claude-3-5-sonnet-20241022" />
        </label>
      </div>

      <div class="ss-settings-section">
        <div class="ss-settings-section-title">🗄️ Git Memory <span class="ss-optional">(optional — stores SOUL.md + MEMORY.md)</span></div>
        <label>Git Host
          <select id="cfg-git-provider">
            <option value="github">GitHub</option>
            <option value="gitlab">GitLab</option>
            <option value="gitea">Gitea / Forgejo</option>
          </select>
        </label>
        <label>Repo Owner
          <input type="text" id="cfg-git-owner" placeholder="e.g. menonpg" />
        </label>
        <label>Repo Name
          <input type="text" id="cfg-git-repo" placeholder="e.g. soulsearch-memory" />
        </label>
        <label>Branch
          <input type="text" id="cfg-git-branch" placeholder="main" />
        </label>
        <label>Access Token <span class="ss-optional">(fine-grained PAT, repo read/write)</span>
          <input type="password" id="cfg-git-token" placeholder="github_pat_..." />
        </label>
        <div id="cfg-git-status" class="ss-git-status"></div>
      </div>

      <div class="ss-settings-section">
        <div class="ss-settings-section-title">🎭 Identity</div>
        <label>Soul (SOUL.md — or leave blank to load from Git repo)
          <textarea id="cfg-soul" rows="3" placeholder="I am a research assistant with persistent memory..."></textarea>
        </label>
      </div>

      <div class="ss-settings-actions">
        <button class="ss-btn ss-btn--primary" id="cfg-save">Save &amp; Sync Memory</button>
        <button class="ss-btn" id="cfg-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
